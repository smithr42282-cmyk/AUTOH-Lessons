<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASE Brake Knowledge Check — AUTOH 172</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f4;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 0;
  }

  .top-bar {
    background: #1a1a1a;
    border-bottom: 4px solid #CC0000;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top-bar-left .kicker { color: #CC0000; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 2px; }
  .top-bar-left h1 { color: #ffffff; font-size: 15px; font-weight: 600; }
  .top-bar-right { color: #aaaaaa; font-size: 12px; text-align: right; }

  .progress-wrap { background: #1a1a1a; padding: 0 24px 14px; }
  .prog-track { background: #333; border-radius: 3px; height: 5px; overflow: hidden; }
  .prog-fill { background: #CC0000; height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .prog-meta { display: flex; justify-content: space-between; margin-top: 6px; }
  .prog-meta span { color: #888; font-size: 11px; }

  .main { max-width: 740px; margin: 0 auto; padding: 28px 20px 60px; }

  .q-card {
    background: #ffffff;
    border-radius: 8px;
    border-top: 4px solid #CC0000;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    padding: 24px 26px;
    margin-bottom: 20px;
    display: none;
  }
  .q-card.active { display: block; }

  .q-label {
    display: inline-flex; align-items: center; justify-content: center;
    background: #CC0000; color: #fff;
    font-size: 11px; font-weight: 700;
    width: 24px; height: 24px; border-radius: 50%;
    margin-bottom: 14px;
  }

  .q-stem {
    font-size: 14px; line-height: 1.7; color: #1a1a1a;
    margin-bottom: 20px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    background: #f9f9f9;
    border: 1.5px solid #e5e5e5;
    border-radius: 7px;
    padding: 13px 15px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
  }
  .opt:hover:not(.locked) { border-color: #CC0000; background: #fff5f5; }

  .opt-badge {
    flex-shrink: 0;
    background: #1a1a1a; color: #fff;
    font-size: 11px; font-weight: 700;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .opt-text { font-size: 13.5px; color: #1a1a1a; line-height: 1.55; }

  .opt.selected { border-color: #CC0000; background: #fff0f0; }
  .opt.selected .opt-badge { background: #CC0000; }

  .opt.correct { border-color: #2e7d32; background: #f0faf0; }
  .opt.correct .opt-badge { background: #2e7d32; }
  .opt.correct .opt-text { color: #1b5e20; font-weight: 600; }

  .opt.wrong { border-color: #c62828; background: #fff5f5; }
  .opt.wrong .opt-badge { background: #c62828; }
  .opt.wrong .opt-text { color: #b71c1c; }

  .opt.show-correct { border-color: #2e7d32; background: #f0faf0; }
  .opt.show-correct .opt-badge { background: #2e7d32; }

  .opt.locked { cursor: default; }

  .rationale {
    margin-top: 16px;
    background: #f5f5f5;
    border-left: 3px solid #CC0000;
    border-radius: 0 6px 6px 0;
    padding: 13px 15px;
    font-size: 13px; line-height: 1.65; color: #333;
    display: none;
  }
  .rationale.show { display: block; }
  .rationale-label { color: #CC0000; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .nav-btn {
    background: #1a1a1a; color: #fff;
    border: none; border-radius: 6px;
    padding: 10px 22px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .nav-btn:hover { background: #333; }
  .nav-btn.red { background: #CC0000; }
  .nav-btn.red:hover { background: #aa0000; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.ghost { background: transparent; color: #666; border: 1.5px solid #ddd; }
  .nav-btn.ghost:hover { background: #f0f0f0; }

  .dots { display: flex; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
  .dot.done { background: #CC0000; }
  .dot.active { background: #1a1a1a; }

  /* RESULTS */
  .results {
    background: #fff;
    border-radius: 8px;
    border-top: 4px solid #CC0000;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    padding: 40px 30px;
    text-align: center;
    display: none;
  }
  .results.show { display: block; }

  .score-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 24px; }
  .score-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 26px; font-weight: 700; color: #1a1a1a;
  }

  .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: #666; margin-bottom: 28px; }

  .result-pills { display: flex; gap: 14px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
  .pill { background: #f5f5f5; border-radius: 8px; padding: 14px 24px; min-width: 90px; }
  .pill-num { font-size: 26px; font-weight: 700; display: block; }
  .pill-label { font-size: 12px; color: #888; }
  .pill.c-green .pill-num { color: #2e7d32; }
  .pill.c-red .pill-num { color: #c62828; }

  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  @media (max-width: 480px) {
    .main { padding: 18px 14px 50px; }
    .q-card { padding: 18px 16px; }
    .top-bar { padding: 12px 16px; }
    .progress-wrap { padding: 0 16px 12px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="kicker">AUTOH 172 · Honda Braking Systems</div>
    <h1>ASE Knowledge Check — Brakes (BR)</h1>
  </div>
  <div class="top-bar-right">5 Questions · 25 pts<br>Individual · No notes</div>
</div>

<div class="progress-wrap">
  <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-meta">
    <span id="prog-label">Question 1 of 5</span>
    <span id="prog-score">0 / 5 answered</span>
  </div>
</div>

<div class="main">
  <h2 class="sr-only">ASE-style brake knowledge check — 5 questions, select the best answer for each</h2>

  <div id="q-container"></div>

  <div class="results" id="results" role="region" aria-label="Quiz results">
    <div class="score-wrap">
      <svg viewBox="0 0 110 110" aria-hidden="true">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#e8e8e8" stroke-width="10"/>
        <circle cx="55" cy="55" r="46" fill="none" stroke="#CC0000" stroke-width="10" stroke-linecap="round"
          id="arc" stroke-dasharray="0 289"/>
      </svg>
      <div class="score-center" id="pct-text">0%</div>
    </div>
    <div class="result-title" id="r-title">Results</div>
    <div class="result-sub" id="r-sub"></div>
    <div class="result-pills">
      <div class="pill c-green"><span class="pill-num" id="r-correct">0</span><span class="pill-label">Correct</span></div>
      <div class="pill c-red"><span class="pill-num" id="r-wrong">0</span><span class="pill-label">Incorrect</span></div>
      <div class="pill"><span class="pill-num" id="r-pts">0/25</span><span class="pill-label">Points</span></div>
    </div>
    <div class="result-actions">
      <button class="nav-btn red" onclick="reviewMode()">Review Answers</button>
      <button class="nav-btn ghost" onclick="restartQuiz()">Retake Quiz</button>
    </div>
  </div>

  <div class="nav" id="nav-row">
    <button class="nav-btn ghost" id="btn-prev" onclick="go(-1)" disabled>&#8592; Prev</button>
    <div class="dots" id="dots" role="navigation" aria-label="Question progress"></div>
    <button class="nav-btn red" id="btn-next" onclick="go(1)">Next &#8594;</button>
  </div>
</div>

<script>
const Qs = [
  {
    stem: "A customer reports brake pedal pulsation during highway-speed stops. A technician measures rotor thickness at eight equal points and finds a 0.04 mm variation. The Honda service specification for thickness variation (TV) is 0.015 mm maximum. Technician A says the rotor must be replaced because it exceeds the TV limit. Technician B says the rotor can be machined as long as the finished thickness will be above the minimum discard thickness. Who is correct?",
    opts: ["Technician A only","Technician B only","Both Technician A and Technician B","Neither Technician A nor Technician B"],
    ans: 2,
    rat: "Both technicians are correct. The rotor exceeds TV spec (0.04 mm vs. 0.015 mm max), making replacement a valid call. Machining is also valid if the finished thickness stays above discard spec — both are defensible decisions. This is the classic ASE 'both are right' scenario: read all four answer choices before committing."
  },
  {
    stem: "On a 2023 Honda Odyssey, the VSA warning light illuminates intermittently and a DTC for a wheel speed sensor fault is stored in the ABS/VSA module. A visual inspection shows the wheel speed sensor connector is clean and undamaged. Which of the following is the MOST likely next step?",
    opts: ["Replace the wheel speed sensor immediately because the DTC confirms sensor failure","Check wheel bearing play and measure rotor lateral runout at that corner — bearing movement can distort the sensor signal","Clear the DTC and return the vehicle — the code may have set due to a low battery","Replace the ABS/VSA modulator control unit because it stores the fault code"],
    ans: 1,
    rat: "On the 2023 Odyssey, wheel speed sensors are integrated into the hub bearing assembly. A clean connector does not rule out a mechanical root cause. Excessive bearing play allows the tone ring to shift relative to the sensor, producing an erratic or dropout signal. The mechanical cause must be eliminated before condemning the sensor."
  },
  {
    stem: "A technician is measuring rotor lateral runout (LRO) using a dial indicator. The total indicator reading (TIR) while rotating the rotor one full revolution is 0.09 mm. Honda's maximum LRO specification is 0.05 mm. Which of the following best describes the relationship between LRO and brake pedal pulsation?",
    opts: ["LRO causes the caliper piston to extend further on one side, wearing pads unevenly but not causing pulsation","Excessive LRO causes the rotor to push and pull against the brake pads as it rotates, generating thickness variation over time and resulting in pedal pulsation","LRO only affects steering vibration and has no direct link to pedal pulsation","LRO is only relevant on rear drum brake conversions and does not apply to disc brake vehicles"],
    ans: 1,
    rat: "Excessive LRO causes the rotor face to wobble side-to-side. Each revolution, the rotor contacts the brake pads at the high spot. Over time, this creates localized heat and wear — producing thickness variation (TV). Once TV develops, the caliper alternately encounters thicker and thinner sections, pushing the pedal up and down. LRO is the upstream cause; TV is the mechanism; pulsation is the symptom."
  },
  {
    stem: "After completing brake rotor replacement on a Honda Odyssey, a technician clears the VSA DTC and performs a road test. The VSA light does not return and no new codes are set. What is the MOST likely explanation for why the brake concern caused the VSA light to illuminate in the first place?",
    opts: ["The VSA module detected low brake fluid pressure during hard stops and activated the warning light as a safety precaution","Rotor runout caused the tone ring to wobble or the rotor face to disturb the sensor gap, producing an erratic wheel speed signal that the VSA module interpreted as a sensor fault","The VSA light came on because the brake pads were worn below minimum thickness, triggering the pad wear sensor circuit","The VSA module detected a mismatch between the steering angle sensor and the yaw rate sensor, unrelated to the brake system"],
    ans: 1,
    rat: "The VSA system relies on accurate wheel speed signals from all four corners. When rotor runout disturbs the sensor gap — or causes the bearing and tone ring to flex at speed — the signal becomes erratic or drops out. The VSA module interprets this as a sensor fault and sets a DTC. Correcting the rotor restores signal quality, which is why the light resolved after the repair."
  },
  {
    stem: "A technician uses scan tool live data and observes that three of the four wheel speed sensors read consistently, but the right-front sensor drops to zero momentarily at speeds above 45 mph. The right-front rotor LRO measurement is 0.07 mm (spec: 0.05 mm max) and the wheel bearing has 0.3 mm of axial play. Which of the following is the correct diagnostic conclusion?",
    opts: ["Replace only the wheel speed sensor — the live data dropout confirms sensor failure independent of other causes","The wheel bearing is the root cause — excessive axial play is allowing the integrated tone ring to move out of the sensor's detection range at speed, causing the signal dropout; address the bearing and recheck LRO before condemning the rotor separately","The rotor is the only concern — replace the rotor and the sensor dropout will resolve on its own","The vehicle needs a steering angle sensor calibration — speed-dependent faults are typically caused by calibration drift"],
    ans: 1,
    rat: "The bearing is the root cause. With 0.3 mm of axial play, the integrated tone ring moves out of the sensor's detection range under load at highway speed — producing the dropout. Replacing only the sensor ignores the mechanical failure causing the symptom. The LRO may also be a consequence of the worn bearing allowing hub movement. Replace the hub bearing first, then re-measure LRO — it may not require separate rotor replacement."
  }
];

let cur = 0;
let answers = new Array(Qs.length).fill(null);
let locked = new Array(Qs.length).fill(false);

function build() {
  const c = document.getElementById('q-container');
  c.innerHTML = '';
  Qs.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card' + (qi === 0 ? ' active' : '');
    card.id = 'qc' + qi;
    card.setAttribute('role', 'group');
    card.setAttribute('aria-label', 'Question ' + (qi+1));

    card.innerHTML = `<div class="q-label" aria-hidden="true">${qi+1}</div>
      <div class="q-stem">${q.stem}</div>
      <div class="options" id="opts${qi}"></div>
      <div class="rationale" id="rat${qi}">
        <div class="rationale-label">Rationale</div>${q.rat}
      </div>`;

    c.appendChild(card);

    const og = document.getElementById('opts' + qi);
    q.opts.forEach((o, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.id = 'o'+qi+'-'+oi;
      btn.setAttribute('aria-label', ['A','B','C','D'][oi] + ': ' + o);
      btn.innerHTML = `<span class="opt-badge" aria-hidden="true">${['A','B','C','D'][oi]}</span><span class="opt-text">${o}</span>`;
      btn.onclick = () => pick(qi, oi);
      og.appendChild(btn);
    });
  });

  buildDots();
  refresh();
}

function buildDots() {
  const dr = document.getElementById('dots');
  dr.innerHTML = '';
  Qs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot'+i;
    d.setAttribute('aria-label', 'Question '+(i+1));
    dr.appendChild(d);
  });
}

function pick(qi, oi) {
  if (locked[qi]) return;
  answers[qi] = oi;
  locked[qi] = true;

  Qs[qi].opts.forEach((_, idx) => {
    const b = document.getElementById('o'+qi+'-'+idx);
    b.classList.add('locked');
    if (idx === oi && oi === Qs[qi].ans) b.classList.add('correct');
    else if (idx === oi) b.classList.add('wrong');
    else if (idx === Qs[qi].ans) b.classList.add('show-correct');
  });

  document.getElementById('rat'+qi).classList.add('show');
  document.getElementById('dot'+qi).classList.add('done');
  refresh();
}

function go(dir) {
  const next = cur + dir;
  if (next < 0) return;
  if (next >= Qs.length) { showResults(); return; }

  document.getElementById('qc'+cur).classList.remove('active');
  cur = next;
  document.getElementById('qc'+cur).classList.add('active');
  refresh();
}

function refresh() {
  const done = answers.filter(a => a !== null).length;
  document.getElementById('pf').style.width = (cur / Qs.length * 100) + '%';
  document.getElementById('prog-label').textContent = 'Question ' + (cur+1) + ' of ' + Qs.length;
  document.getElementById('prog-score').textContent = done + ' / ' + Qs.length + ' answered';

  document.getElementById('btn-prev').disabled = cur === 0;

  const allDone = answers.every(a => a !== null);
  const nb = document.getElementById('btn-next');
  if (cur === Qs.length - 1) {
    nb.textContent = allDone ? 'See Results' : 'Next →';
    nb.onclick = allDone ? showResults : () => {};
    nb.disabled = !allDone;
  } else {
    nb.textContent = 'Next →';
    nb.onclick = () => go(1);
    nb.disabled = false;
  }

  Qs.forEach((_, i) => {
    const d = document.getElementById('dot'+i);
    if (!d) return;
    d.className = 'dot';
    if (answers[i] !== null) d.classList.add('done');
    if (i === cur) d.classList.add('active');
  });
}

function showResults() {
  document.getElementById('q-container').style.display = 'none';
  document.getElementById('nav-row').style.display = 'none';
  document.getElementById('results').classList.add('show');
  document.getElementById('pf').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';

  const correct = answers.filter((a, i) => a === Qs[i].ans).length;
  const wrong = Qs.length - correct;
  const pct = Math.round(correct / Qs.length * 100);

  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-pts').textContent = (correct * 5) + '/25';
  document.getElementById('pct-text').textContent = pct + '%';

  const circ = 2 * Math.PI * 46;
  const fill = (correct / Qs.length) * circ;
  const arc = document.getElementById('arc');
  arc.setAttribute('stroke-dasharray', fill.toFixed(1) + ' ' + circ.toFixed(1));
  arc.setAttribute('stroke', pct >= 80 ? '#2e7d32' : pct >= 60 ? '#e65100' : '#c62828');

  const titles = ['Needs Review','Passing — Review Your Misses','Solid Work','Strong Performance','Perfect Score!'];
  const subs = [
    'Go back through each rationale carefully. Identify the concept you missed — not just the answer.',
    'Getting closer. Review the rationale on your incorrect questions and connect it back to the system.',
    'Good diagnostic reasoning. One more pass through the rationale and you\'ll be exam-ready.',
    'ASE-level thinking demonstrated. Check the rationale on any misses to lock in the reasoning.',
    'Perfect score — outstanding diagnostic reasoning on all five questions.'
  ];
  document.getElementById('r-title').textContent = titles[correct];
  document.getElementById('r-sub').textContent = subs[correct];
}

function reviewMode() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('q-container').style.display = 'block';
  document.getElementById('nav-row').style.display = 'flex';
  cur = 0;
  Qs.forEach((_, qi) => {
    document.getElementById('qc'+qi).className = 'q-card' + (qi === 0 ? ' active' : '');
  });
  refresh();
}

function restartQuiz() {
  answers = new Array(Qs.length).fill(null);
  locked = new Array(Qs.length).fill(false);
  cur = 0;
  document.getElementById('results').classList.remove('show');
  document.getElementById('q-container').style.display = 'block';
  document.getElementById('nav-row').style.display = 'flex';
  build();
}

build();
</script>
</body>
</html>
